<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para mi Niña Hermosa 💛</title>
    
    <!-- Fuentes bonitas de Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Nunito:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* Configuraciones generales */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #FFFDF5;
            color: #5C3A21;
            font-family: 'Nunito', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* Tipografía para títulos */
        h1, h2, h3, .fuente-titulo {
            font-family: 'Fredoka', sans-serif;
        }

        .contenedor {
            width: 100%;
            max-width: 450px;
            padding: 40px 20px 20px 20px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            color: #5C3A21;
        }

        .subtitulo {
            font-size: 1.1rem;
            color: rgba(92, 58, 33, 0.8);
            margin-bottom: 30px;
        }

        /* Dibujo animado de Pompompurin */
        @keyframes flotar {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .dibujo-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px auto;
            animation: flotar 3.5s ease-in-out infinite;
            position: relative;
            cursor: pointer;
        }

        .brillo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 90%;
            background-color: rgba(255, 215, 0, 0.25);
            border-radius: 50%;
            filter: blur(25px);
            z-index: 1;
        }

        .dibujo-svg {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
        }

        .instruccion {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(92, 58, 33, 0.5);
            margin-top: 10px;
            font-weight: 700;
        }

        /* Botón Principal (El Mensaje) */
        @keyframes latido {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .btn-principal {
            background-color: #FF4B72;
            color: white;
            border: 4px solid white;
            padding: 16px 25px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 75, 114, 0.4);
            animation: latido 2s infinite;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background-color 0.3s, transform 0.1s;
        }

        .btn-principal:active {
            transform: scale(0.96);
            animation: none;
        }

        /* Animación de Lluvia de Emojis */
        .gota {
            position: fixed;
            top: -50px;
            z-index: 1;
            user-select: none;
            pointer-events: none;
            animation: caer linear forwards;
        }

        @keyframes caer {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* Modales (Ventanas Emergentes) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(92, 58, 33, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.activo {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #FFFDF5;
            width: 100%;
            max-width: 340px;
            padding: 35px 25px;
            border-radius: 30px;
            text-align: center;
            position: relative;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .modal-overlay.activo .modal-content {
            transform: scale(1);
        }

        .modal-mensaje { border: 4px solid #FF9FB5; }
        .modal-ruleta { border: 4px solid #4CAF50; background: white; }

        .btn-cerrar {
            position: absolute;
            top: 12px;
            right: 18px;
            background: none;
            border: none;
            font-size: 2rem;
            color: #5C3A21;
            opacity: 0.4;
            cursor: pointer;
        }

        /* Textos del Mensaje Hermoso */
        .frase-principal {
            font-size: 1.8rem;
            color: #FF4B72;
            margin: 15px 0;
            line-height: 1.2;
        }

        .frase-secundaria {
            font-size: 1.1rem;
            font-style: italic;
            opacity: 0.9;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .btn-modal {
            color: white;
            border: none;
            padding: 14px 0;
            width: 100%;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Estilos de la Ruleta */
        .ruleta-container {
            margin-top: 30px;
            margin-bottom: 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #ruletaCanvas {
            width: 280px;
            height: 280px;
            border: 5px solid #FFD700;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .ruleta-indicador {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 20px solid #FF4B72;
            z-index: 10;
        }

        .btn-girar {
            background-color: #4CAF50;
            color: white;
            border: 4px solid white;
            padding: 12px 20px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-top: 20px;
            transition: background-color 0.3s, transform 0.1s;
        }

        .btn-girar:active {
            transform: scale(0.95);
        }

        #resultadoRuleta {
            margin-top: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #FF4B72;
        }

    </style>
</head>
<body>

    <div class="contenedor">
        
        <h1 class="fuente-titulo">¡Hola, mi amor! 💛</h1>
        <p class="subtitulo">Te preparé una pequeña sorpresa...</p>

        <!-- Pompompurin interactivo -->
        <div class="dibujo-container" onclick="crearDestellos(event)">
            <div class="brillo"></div>
            <!-- SVG de Pompompurin dibujado con código -->
            <svg class="dibujo-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <!-- Cuerpo -->
                <rect x="50" y="55" width="100" height="105" rx="45" fill="#FFD700" />
                <!-- Orejas -->
                <ellipse cx="45" cy="95" rx="14" ry="32" fill="#FFD700" transform="rotate(22 45 95)" />
                <ellipse cx="155" cy="95" rx="14" ry="32" fill="#FFD700" transform="rotate(-22 155 95)" />
                <!-- Boina -->
                <ellipse cx="100" cy="45" rx="35" ry="12" fill="#5C3A21" />
                <circle cx="100" cy="35" r="8" fill="#5C3A21" />
                <!-- Cara -->
                <circle cx="80" cy="100" r="5.5" fill="#5C3A21" />
                <circle cx="120" cy="100" r="5.5" fill="#5C3A21" />
                <ellipse cx="65" cy="110" rx="9" ry="4" fill="#FF9FB5" opacity="0.7" />
                <ellipse cx="135" cy="110" rx="9" ry="4" fill="#FF9FB5" opacity="0.7" />
                <circle cx="100" cy="105" r="3" fill="#5C3A21" />
                <path d="M 90 112 Q 95 118 100 112 Q 105 118 110 112" fill="none" stroke="#5C3A21" stroke-width="3" stroke-linecap="round" />
                <!-- Corazón -->
                <path d="M 100 145 C 100 145 85 130 85 120 C 85 110 105 110 100 125 C 95 110 115 110 115 120 C 115 130 100 145 100 145 Z" fill="#FF4B72" transform="scale(1.8) translate(-45, -55)"/>
                <!-- Patitas -->
                <ellipse cx="80" cy="135" rx="10" ry="7" fill="#FFD700" transform="rotate(-25 80 135)" />
                <ellipse cx="120" cy="135" rx="10" ry="7" fill="#FFD700" transform="rotate(25 120 135)" />
            </svg>
            <p class="instruccion">Tócale la pancita 👆</p>
        </div>

        <!-- Sección de la Ruleta -->
        <h2 class="fuente-titulo titulo-vales">🎡 Gira la Ruleta de Bonos 🎡</h2>
        <div class="ruleta-container">
            <canvas id="ruletaCanvas" width="500" height="500"></canvas>
            <div class="ruleta-indicador"></div>
            <button class="btn-girar fuente-titulo" onclick="girarRuleta()">¡GIRAR!</button>
            <p id="resultadoRuleta"></p>
        </div>

        <!-- Botón Principal -->
        <button class="btn-principal fuente-titulo" onclick="abrirMensaje()">
            ✨ Toca para un mensajito ✨
        </button>

    </div>

    <!-- Modal del Mensaje -->
    <div class="modal-overlay" id="modal-mensaje">
        <div class="modal-content modal-mensaje">
            <button class="btn-cerrar fuente-titulo" onclick="cerrarModal('modal-mensaje')">×</button>
            <div style="font-size: 3.5rem; margin-bottom: 10px; animation: flotar 2s infinite;">💖</div>
            
            <h2 class="fuente-titulo frase-principal">Te amou amour muchio 💛</h2>
            <p class="frase-secundaria">
                "Eres perfecta, maravillosa y la persona más increíble que hace de mis días los mejores de toda mi vida."
            </p>
            
            <button class="btn-modal fuente-titulo" style="background-color: #FF9FB5;" onclick="cerrarModal('modal-mensaje')">
                Yo también te amo ✨
            </button>
        </div>
    </div>

    <!-- Modal de Ruleta Resultado -->
    <div class="modal-overlay" id="modal-ruleta-resultado">
        <div class="modal-content modal-ruleta">
            <button class="btn-cerrar fuente-titulo" onclick="cerrarModal('modal-ruleta-resultado')">×</button>
            <div style="font-size: 3.5rem; margin-bottom: 15px;">🎁</div>
            <h2 class="fuente-titulo" id="ruleta-resultado-titulo" style="font-size: 1.5rem; margin-bottom: 10px; color: #5C3A21;"></h2>
            <p id="ruleta-resultado-desc" style="margin-bottom: 25px; font-size: 1.05rem; opacity: 0.8;"></p>
            <button class="btn-modal fuente-titulo" style="background-color: #4CAF50;" onclick="cerrarModal('modal-ruleta-resultado')">
                ¡Entendido!
            </button>
        </div>
    </div>

    <script>
        // 1. Lluvia de Emojis de fondo
        const emojis = ['💛', '🍮', '✨'];
        
        function iniciarLluvia() {
            setInterval(() => {
                const gota = document.createElement('div');
                gota.classList.add('gota');
                gota.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                
                // Posición y tamaño aleatorios
                gota.style.left = Math.random() * 95 + 'vw';
                gota.style.fontSize = (Math.random() * 12 + 14) + 'px'; // Entre 14px y 26px
                gota.style.opacity = Math.random() * 0.5 + 0.2;
                
                // Duración de la caída
                const duracion = Math.random() * 4 + 4; 
                gota.style.animationDuration = duracion + 's';
                
                document.body.appendChild(gota);
                
                // Eliminar cuando termine la animación
                setTimeout(() => gota.remove(), duracion * 1000);
            }, 700); // Cae un elemento cada 700ms
        }
        
        // Arrancar lluvia
        window.onload = iniciarLluvia;

        // 2. Destellos al tocar a Pompompurin
        function crearDestellos(e) {
            // Intentar vibrar el celular
            if(navigator.vibrate) navigator.vibrate(40);
            
            for(let i = 0; i < 6; i++) {
                const estrella = document.createElement('div');
                estrella.innerHTML = '✨';
                estrella.style.position = 'fixed';
                
                // Obtener coordenadas del toque (ratón o dedo)
                const x = e.clientX || (e.touches && e.touches[0].clientX);
                const y = e.clientY || (e.touches && e.touches[0].clientY);
                
                estrella.style.left = x + 'px';
                estrella.style.top = y + 'px';
                estrella.style.fontSize = '22px';
                estrella.style.pointerEvents = 'none';
                estrella.style.transition = 'all 0.6s ease-out';
                
                document.body.appendChild(estrella);
                
                // Animación de dispersión en círculo
                setTimeout(() => {
                    const angulo = (i / 6) * Math.PI * 2;
                    const distancia = 70;
                    estrella.style.transform = `translate(${Math.cos(angulo)*distancia}px, ${Math.sin(angulo)*distancia}px) scale(1.5)`;
                    estrella.style.opacity = '0';
                }, 10);
                
                setTimeout(() => estrella.remove(), 600);
            }
        }

        // 3. Control de ventanas emergentes (Modales)
        function abrirMensaje() {
            document.getElementById('modal-mensaje').classList.add('activo');
            if(navigator.vibrate) navigator.vibrate([30, 50, 30]); 
        }

        function cerrarModal(idModal) {
            document.getElementById(idModal).classList.remove('activo');
        }

        // 4. Lógica de la Ruleta
        const canvas = document.getElementById('ruletaCanvas');
        const ctx = canvas.getContext('2d');
        const premios = [
            { text: 'Nada 😔', weight: 40, color: '#CCCCCC', description: '¡Ups! No hay bono esta vez, pero siempre hay amor.' },
            { text: 'Dulce 🍬', weight: 20, color: '#FFB347', description: '¡Un dulce para endulzar tu día!' },
            { text: 'Verdad o Reto 🤔', weight: 15, color: '#87CEEB', description: '¡Es hora de la diversión! ¿Verdad o Reto?' },
            { text: 'Foto 📸', weight: 10, color: '#FFD700', description: '¡Una foto juntos para el recuerdo!' },
            { text: 'Abrazo 🤗', weight: 5, color: '#FF9FB5', description: '¡Un cálido abrazo para ti!' },
            { text: 'Agarrarse la mano 🤝', weight: 5, color: '#90EE90', description: '¡Un paseo tomados de la mano!' },
            { text: 'Algo Libre ✨', weight: 5, color: '#DDA0DD', description: '¡Pide lo que quieras, mi amor!' },
            { text: 'Vale por un Beso 💋', weight: 5, color: '#FF69B4', description: '¡Un besote para mi persona favorita!' },
            { text: 'Cita de Postres 🍰', weight: 10, color: '#F08080', description: '¡Yo invito, tú eliges el lugar para unos ricos postres!' },
            { text: 'Tarde de Pelis 🎬', weight: 10, color: '#ADD8E6', description: '¡Preparo palomitas y tu manta favorita para una tarde de pelis!' },
            { text: 'Vale de la Razón 👑', weight: 10, color: '#DAA520', description: '¡Por esta vez, tú tienes la razón en todo! 😉' }
        ];

        const totalWeight = premios.reduce((sum, premio) => sum + premio.weight, 0);
        const arcSize = 2 * Math.PI / totalWeight;

        function dibujarRuleta() {
            let startAngle = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Limpiar el canvas antes de dibujar

            for (let i = 0; i < premios.length; i++) {
                const premio = premios[i];
                const endAngle = startAngle + premio.weight * arcSize;

                ctx.beginPath();
                ctx.arc(250, 250, 250, startAngle, endAngle);
                ctx.lineTo(250, 250);
                ctx.fillStyle = premio.color;
                ctx.fill();
                ctx.strokeStyle = '#5C3A21'; // Borde para cada segmento
                ctx.lineWidth = 1; 
                ctx.stroke();

                ctx.save();

                ctx.translate(250, 250);
                ctx.rotate(startAngle + premio.weight * arcSize / 2); // Rotar al centro del segmento
                ctx.textAlign = 'right';
                ctx.fillStyle = '#5C3A21';
                ctx.font = 'bold 20px Fredoka'; // Reducir tamaño de fuente
                
                // Ajustar posición del texto para que no se salga
                const text = premio.text;
                const maxTextWidth = 200; // Ancho máximo para el texto
                const textX = 230; // Distancia desde el centro

                // Si el texto es muy largo, ajustarlo o dividirlo
                if (ctx.measureText(text).width > maxTextWidth) {
                    let words = text.split(' ');
                    let line1 = '';
                    let line2 = '';
                    for (let j = 0; j < words.length; j++) {
                        if (ctx.measureText(line1 + words[j]).width < maxTextWidth) {
                            line1 += words[j] + ' ';
                        } else {
                            line2 += words[j] + ' ';
                        }
                    }
                    ctx.fillText(line1.trim(), textX, 0); // Primera línea
                    if (line2.trim() !== '') {
                        ctx.fillText(line2.trim(), textX, 25); // Segunda línea, un poco más abajo
                    }
                } else {
                    ctx.fillText(text, textX, 10);
                }
                
                ctx.restore();

                startAngle = endAngle;
            }
        }

        let isSpinning = false;

        function girarRuleta() {
            if (isSpinning) return;
            isSpinning = true;

            const ruletaCanvas = document.getElementById('ruletaCanvas');
            const btnGirar = document.querySelector('.btn-girar');
            const resultadoRuleta = document.getElementById('resultadoRuleta');

            btnGirar.disabled = true;
            resultadoRuleta.innerText = 'Girando...';

            const randomIndex = seleccionarPremioPorPeso();
            const selectedPremio = premios[randomIndex];

            // Calcular el ángulo de rotación para que el premio seleccionado quede en el indicador
            // El indicador está en la parte superior (0 grados o 360 grados)
            // Los premios se dibujan en sentido horario desde el ángulo 0 (derecha)
            // Necesitamos que el centro del segmento del premio quede en la parte superior
            let spinAngle = 0;
            for (let i = 0; i < randomIndex; i++) {
                spinAngle += premios[i].weight * arcSize;
            }
            spinAngle += selectedPremio.weight * arcSize / 2; // Centro del segmento

            // Ajustar para que el indicador apunte al centro del premio
            // La ruleta gira en sentido horario, el indicador está en la parte superior (90 grados en un círculo trigonométrico)
            // Queremos que el centro del premio esté en 270 grados (si 0 es a la derecha)
            // Para que el indicador apunte al centro del premio, necesitamos que el ángulo final de la ruleta
            // sea tal que el centro del segmento del premio esté alineado con la parte superior.
            // El 0 de la ruleta está a la derecha. El indicador está arriba (equivalente a 270 grados en un círculo trigonométrico).
            // Por lo tanto, necesitamos que el ángulo del centro del premio sea 270 grados (o -90 grados).
            // El ángulo de inicio del dibujo es 0 (derecha). Los ángulos aumentan en sentido horario.
            // Si el centro del premio está en `spinAngle` (desde el 0 a la derecha, en sentido horario),
            // para que quede arriba, la ruleta debe girar `(2 * Math.PI - spinAngle) + (3 * Math.PI * 2)`
            // o de forma más sencilla, calcular el ángulo necesario para que el centro del segmento quede en la posición del indicador.
            
            // El indicador está en la posición de las 12 en punto. El 0 de nuestro canvas está a las 3 en punto.
            // Para que un segmento apunte a las 12 en punto, su centro debe estar a 270 grados (o -90 grados).
            // Nuestro `spinAngle` es relativo al 0 (3 en punto) y aumenta en sentido horario.
            // El ángulo objetivo para el centro del segmento es -Math.PI / 2 (o 270 grados).
            // La rotación necesaria es (ángulo objetivo - spinAngle).
            // Añadimos giros completos para que la animación sea visible.
            const targetAngle = -Math.PI / 2; // Posición de las 12 en punto
            let rotationNeeded = targetAngle - spinAngle;
            rotationNeeded = rotationNeeded % (2 * Math.PI); // Normalizar a -2PI a 2PI
            if (rotationNeeded < 0) rotationNeeded += 2 * Math.PI; // Asegurar que sea positivo

            const finalRotation = (5 * 2 * Math.PI) + rotationNeeded; // 5 giros completos + el ángulo necesario

            ruletaCanvas.style.transform = `rotate(${finalRotation}rad)`;

            setTimeout(() => {
                resultadoRuleta.innerText = `¡Ganaste: ${selectedPremio.text}!`;
                abrirModalRuleta(selectedPremio.text, selectedPremio.description);
                btnGirar.disabled = false;
                isSpinning = false;
            }, 4000); // Duración de la animación CSS
        }

        function seleccionarPremioPorPeso() {
            let random = Math.random() * totalWeight;
            let currentWeight = 0;
            for (let i = 0; i < premios.length; i++) {
                currentWeight += premios[i].weight;
                if (random < currentWeight) {
                    return i;
                }
            }
            return 0; 
        }

        function abrirModalRuleta(titulo, descripcion) {
            document.getElementById('ruleta-resultado-titulo').innerText = titulo;
            document.getElementById('ruleta-resultado-desc').innerText = descripcion;
            document.getElementById('modal-ruleta-resultado').classList.add('activo');
            if(navigator.vibrate) navigator.vibrate([50, 30, 50]); 
        }

        dibujarRuleta();
    </script>
</body>
</html>
